name: CodSpeed Benchmarks

on:
  push:
    branches:
      - "main"
  pull_request: # required to have reports on PRs
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version-file: pyproject.toml
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Write MOSEK license
        env:
          MSK_LICENSE: ${{ secrets.MSK_LICENSE }}
        run: echo "$MSK_LICENSE" > "${{ github.workspace }}/mosek.lic"
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f
        env:
          MOSEKLM_LICENSE_FILE: ${{ github.workspace }}/mosek.lic
        with:
          mode: simulation
          run: uv run --all-extras --dev --config-setting 'build-args=--profile=release' pytest -x --codspeed -m "not walltime"

  benchmarks-walltime:
    name: Run benchmarks with walltime
    runs-on: codspeed-macro
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version-file: pyproject.toml
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Write MOSEK license
        env:
          MSK_LICENSE: ${{ secrets.MSK_LICENSE }}
        run: echo "$MSK_LICENSE" > "${{ github.workspace }}/mosek.lic"
      - name: Run the walltime benchmarks
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f
        env:
          MOSEKLM_LICENSE_FILE: ${{ github.workspace }}/mosek.lic
        with:
          mode: walltime
          run: uv run --all-extras --dev --config-setting 'build-args=--profile=release' pytest -x --codspeed -m walltime
