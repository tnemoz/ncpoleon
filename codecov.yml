# Rust coverage comes from `cargo test` *and* from the instrumented extension module
# that pytest imports, so a Python-only change can legitimately move it. Both reports
# are therefore uploaded on every run and neither flag carries forward: a missing
# upload must show up as a gap, not as a stale number from a previous commit.
flags:
  rust:
    paths:
      - src/
  python:
    paths:
      - python/ncpoleon/

comment:
  layout: " diff, flags, files"
  behavior: default
  require_changes: false  # if true: only post the comment if coverage changes
  require_base: false        # [true :: must have a base report to post]
  require_head: true       # [true :: must have a head report to post]
  hide_project_coverage: false # [true :: only show coverage on the git diff aka patch coverage]]