name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Python tests
        env:
          MSK_LICENSE: ${{ secrets.MSK_LICENSE }}
        run: |
          printf '%s' "$MSK_LICENSE" > "$HOME/mosek.lic"
          export MOSEKLM_LICENSE_FILE="$HOME/mosek.lic"
          sha256sum "$MOSEKLM_LICENSE_FILE"
          uv run pytest -x

  cargo-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: Rust tests
        run: cargo test
