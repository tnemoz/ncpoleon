flags:
  rust:
    paths:
      - src/
  python:
    paths:
      - python/ncpoleon/

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
        base: auto
      rust:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - rust
      python:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - python

comment:
  layout: " diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false
